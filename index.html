<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#7ec8ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>&#xC218;&#xD559;&#xB450;&#xB1CC;&#xD14C;&#xC2A4;&#xD2B8;</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app" class="app">
      <div class="page-head">
        <h1 class="app-title">&#xC218;&#xD559;&#xB450;&#xB1CC;&#xD14C;&#xC2A4;&#xD2B8;</h1>
        <p class="app-tagline">&#xC5BC;&#xB9C8;&#xB098; &#xC88B;&#xC740; &#xB450;&#xB1CC;&#xB97C; &#xAC00;&#xC9C0;&#xACE0; &#xC788;&#xB294;&#xC9C0; &#xD14C;&#xC2A4;&#xD2B8;&#xD569;&#xB2C8;&#xB2E4;.</p>
        <div class="how-to-wrap">
          <span class="how-to-trigger" tabindex="0">&#xAC8C;&#xC784;&#xBC29;&#xBC95;</span>
          <div class="how-to-tooltip" id="howToTooltip" role="tooltip">
            <p>&#xB9C8;&#xC6B0;&#xC2A4;&#xB098; &#xC190;&#xAC00;&#xB77D;&#xC73C;&#xB85C; &#xB4DC;&#xB798;&#xADF8;&#xD574;&#xC11C; 10&#xC744; &#xB9CC;&#xB4E4;&#xBA74; &#xC810;&#xC218;&#xB97C; &#xCDE8;&#xB4DD;&#xD569;&#xB2C8;&#xB2E4;.</p>
            <ul class="how-to-rules">
              <li>&#xC0AC;&#xACFC; 2&#xAC1C;&#xB85C; 10&#xC744; &#xB9CC;&#xB4E4;&#xBA74; 5&#xC810;</li>
              <li>&#xC0AC;&#xACFC; 3&#xAC1C;&#xB85C; 10&#xC744; &#xB9CC;&#xB4E4;&#xBA74; 10&#xC810;</li>
              <li>&#xC0AC;&#xACFC; 4&#xAC1C;&#xB85C; 10&#xC744; &#xB9CC;&#xB4E4;&#xBA74; 20&#xC810;</li>
              <li>&#xC0AC;&#xACFC; 5&#xAC1C;&#xC774;&#xC0C1;&#xC73C;&#xB85C; 10&#xC744; &#xB9CC;&#xB4E4;&#xBA74; 50&#xC810;</li>
            </ul>
          </div>
        </div>
      </div>
      <header class="header">
        <div class="hud" aria-live="polite">
          <div class="hud-chip hud-score">
            <span class="chip-caption">&#xC810;&#xC218;</span>
            <span id="scoreNum" class="chip-value">0</span>
          </div>
          <div class="hud-chip hud-time">
            <span class="chip-caption">&#xB0A8;&#xC740; &#xC2DC;&#xAC04;</span>
            <span id="timeNum" class="chip-value">120</span>
            <span class="chip-sec">&#xCD08;</span>
          </div>
        </div>
        <div class="controls">
          <div class="audio-controls" aria-label="Sound">
            <button type="button" id="muteBtn" class="btn-audio-mute" aria-pressed="false"></button>
            <input
              type="range"
              id="volumeSlider"
              class="volume-slider"
              min="0"
              max="100"
              value="65"
              aria-valuemin="0"
              aria-valuemax="100"
            />
          </div>
          <button type="button" id="restartBtn" class="btn btn-restart"></button>
        </div>
      </header>
      <div class="canvas-wrap">
        <canvas id="gameCanvas" aria-label="Game board"></canvas>
      </div>
      <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
        <div class="overlay-card">
          <h2 id="overlayTitle"></h2>
          <p id="overlayMessage"></p>
          <button type="button" id="overlayClose" class="btn btn-overlay"></button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
